apiVersion: v1
kind: Namespace
metadata:
  name: token-node
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-node
  namespace: token-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: token-node
  template:
    metadata:
      labels:
        app: token-node
    spec:
      containers:
        - name: token-node
          image: ghcr.io/your-org/token-node:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8788
          env:
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: token-node-secrets
                  key: rpc_url
            - name: LEDGER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: token-node-secrets
                  key: ledger_address
            - name: REGISTRY_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: token-node-secrets
                  key: registry_address
            - name: LEDGER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: token-node-secrets
                  key: ledger_database_url
          readinessProbe:
            httpGet:
              path: /health
              port: 8788
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8788
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: token-node
  namespace: token-node
spec:
  selector:
    app: token-node
  ports:
    - name: http
      port: 80
      targetPort: 8788

